networks:
  aplicaciones:
    driver: bridge
    ipam:
      config:
        - subnet: "10.2.3.0/24"
          gateway: "10.2.3.1"

services:
  samba_dc:
    image: nowsci/samba-domain:latest
    container_name: samba-dc
    hostname: dc1
    domainname: labtel.local

    # Para evitar problemas típicos de ACL, sysvol, ntp y permisos internos
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_TIME

    networks:
      aplicaciones:
        ipv4_address: 10.2.3.5

    # Evita autoreferencia DNS circular problemática al inicio
    dns:
      - 8.8.8.8
      - 1.1.1.1

    environment:
      DOMAIN: LABTEL.LOCAL
      DOMAINPASS: "CiberSeguridad2024!"
      ROLE: dc
      JOIN: "false"
      DNS_FORWARDER: 8.8.8.8
      TZ: America/Santiago

    volumes:
      - samba_data:/var/lib/samba
      - samba_config:/etc/samba

    tmpfs:
      - /run
      - /tmp

    # Eliminamos el override del command que causaba el error de /sbin/tini
    # command: ["/sbin/tini", "--", "/usr/bin/supervisor.sh"]

    healthcheck:
      test: ["CMD-SHELL", "samba-tool domain info 127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

    restart: unless-stopped
    stop_grace_period: 60s

  dvwa:
    image: vulnerables/web-dvwa
    build:
      context: ./DVWA
      dockerfile: ./Dockerfile
    container_name: dvwa
    depends_on:
      samba_dc:
        condition: service_healthy
    networks:
      aplicaciones:
        ipv4_address: 10.2.3.2
    dns:
      - 10.2.3.5
      - 8.8.8.8
    ports:
      - "5001:80"
    restart: unless-stopped

  webgoat:
    image: webgoat/webgoat
    build: 
      context: ./web3
      dockerfile: ./Dockerfile
    container_name: webgoat
    depends_on:
      samba_dc:
        condition: service_healthy
    networks:
      aplicaciones:
        ipv4_address: 10.2.3.3
    dns:
      - 10.2.3.5
      - 8.8.8.8
    ports:
      - "5002:8080"
    restart: unless-stopped

  ftpd_autenticado:
    image: instrumentisto/pure-ftpd:1.0.53
    build:
      context: ./ftp_auth
      dockerfile: ./Dockerfile
    container_name: ftpd-autenticado
    depends_on:
      samba_dc:
        condition: service_healthy
    networks:
      aplicaciones:
        ipv4_address: 10.2.3.4
    dns:
      - 10.2.3.5
      - 8.8.8.8
    ports:
      - "5003:21"
      - "30000-30009:30000-30009"
    environment:
      PUBLICHOST: 10.2.3.4
      FTP_PASSIVE_PORTS: "30000:30009"
      ANONYMOUS_USER_ENABLED: "false"
      ANONYMOUS_UPLOAD_ENABLED: "false"
      ANONYMOUS_MKDIR_ENABLED: "false"
    restart: unless-stopped
    volumes:
      - ftpdata_auth:/var/ftp 

volumes:
  samba_data:
  samba_config:
  ftpdata_auth:
