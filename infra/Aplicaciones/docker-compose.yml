name: enterprise-zone3-internal

networks:
  infra_tier:
    driver: macvlan
    driver_opts:
      parent: ${APPS_PARENT_IFACE:-enp2s2} # Interfaz del host Apps (access port). Si usas trunk, usar subinterfaz VLAN.
    ipam:
      config:
        - subnet: "${APPS_SUBNET:-10.2.3.0/24}"
          gateway: "${APPS_GATEWAY:-10.2.3.1}"
          ip_range: "${APPS_IP_RANGE:-10.2.3.0/28}"

secrets:
  samba_admin_password:
    file: ./secrets/samba_pass.txt

services:
  samba_dc:
    image: nowsci/samba-domain:latest
    container_name: samba-dc
    hostname: dc1
    domainname: ${AD_DOMAIN_DNS:-equipoa.local}
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
      - SYS_TIME
      - NET_ADMIN
      - DAC_OVERRIDE
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - seccomp:unconfined
    networks:
      infra_tier:
        ipv4_address: "${APPS_AD_IP:-10.2.3.5}"
    dns:
      - 127.0.0.1
    environment:
      DOMAIN: ${AD_DOMAIN_NETBIOS:-EQUIPOA.LOCAL}
      DOMAINPASS_FILE: /run/secrets/samba_admin_password
      ROLE: dc
      DNS_FORWARDER: ${APPS_DNS_FORWARDER:-200.1.6.2} # DNS de Zona Pública
      TZ: ${LAB_TZ:-America/Santiago}
    secrets:
      - samba_admin_password
    volumes:
      - samba_data:/var/lib/samba
      - samba_config:/etc/samba
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.2'
          memory: 512M
    healthcheck:
      test: ["CMD", "samba-tool", "domain", "info", "127.0.0.1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa
    depends_on:
      samba_dc:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true # Evita que exploits en DVWA eleven privilegios en el contenedor
    networks:
      infra_tier:
        ipv4_address: "${APPS_DVWA_IP:-10.2.3.2}"
    dns:
      - ${APPS_AD_IP:-10.2.3.5}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  webgoat:
    image: webgoat/webgoat:latest
    container_name: webgoat
    depends_on:
      samba_dc:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      infra_tier:
        ipv4_address: "${APPS_WEBGOAT_IP:-10.2.3.3}"
    dns:
      - ${APPS_AD_IP:-10.2.3.5}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ftpd_autenticado:
    image: instrumentisto/pure-ftpd:latest
    container_name: ftpd-auth
    depends_on:
      samba_dc:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
      - SYS_CHROOT
    networks:
      infra_tier:
        ipv4_address: "${APPS_FTP_IP:-10.2.3.4}"
    dns:
      - ${APPS_AD_IP:-10.2.3.5}
    environment:
      PUBLICHOST: "${APPS_FTP_IP:-10.2.3.4}"
      FTP_PASSIVE_PORTS: "30000:30010"
      LDAP_CONFIG_FILE: /etc/pure-ftpd/pureftpd-ldap.conf
      ANONYMOUS_USER_ENABLED: "false"
    volumes:
      - ftpdata_auth:/var/ftp
      - ./configs/pureftpd-ldap.conf:/etc/pure-ftpd/pureftpd-ldap.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  samba_data:
  samba_config:
  ftpdata_auth:
