name: enterprise-zone3-internal

# Zona 3: Aplicaciones internas corporativas (10.2.3.0/24)
# Objetivo: aislar y proteger software interno en una sola red, ruteable por infraestructura física.
networks:
  zone3_apps:
    driver: macvlan
    driver_opts:
      parent: enp2s2.20 # Subinterfaz VLAN conectada a routers físicos para Zona 3
    ipam:
      config:
        - subnet: "10.2.3.0/24"
          gateway: "10.2.3.1"
          ip_range: "10.2.3.16/28" # Rango reservado para contenedores de aplicación

secrets:
  samba_admin_password:
    file: ./secrets/samba_pass.txt

services:
  # Directorio activo básico para autenticación LDAP/AD.
  # Rol empresarial: identidad centralizada y base para RBAC.
  samba_dc:
    image: nowsci/samba-domain:latest
    container_name: samba-dc
    hostname: dc1
    domainname: labtel.local
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
      - SYS_TIME
      - NET_ADMIN
      - DAC_OVERRIDE
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - seccomp:unconfined
    networks:
      zone3_apps:
        ipv4_address: 10.2.3.5
    dns:
      - 127.0.0.1
    environment:
      DOMAIN: LABTEL.LOCAL
      DOMAINPASS_FILE: /run/secrets/samba_admin_password
      ROLE: dc
      DNS_FORWARDER: 200.1.6.2 # Resolución enrutada hacia la Zona 1
      TZ: America/Santiago
    secrets:
      - samba_admin_password
    volumes:
      - samba_data:/var/lib/samba
      - samba_config:/etc/samba
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.2'
          memory: 512M
    healthcheck:
      test: ["CMD", "samba-tool", "domain", "info", "127.0.0.1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Plataforma vulnerable interna para pruebas controladas.
  # Se autentica contra el DNS/AD interno de la Zona 3.
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa
    depends_on:
      samba_dc:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true # Evita que exploits en DVWA eleven privilegios en el contenedor
    networks:
      zone3_apps:
        ipv4_address: 10.2.3.20
    dns:
      - 10.2.3.5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Servidor web interno para empleados corporativos.
  # Publica contenido sólo dentro de la red de aplicaciones internas.
  web_interno:
    image: nginx:1.29.7-alpine-slim
    container_name: web-interno
    depends_on:
      samba_dc:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      zone3_apps:
        ipv4_address: 10.2.3.21
    dns:
      - 10.2.3.5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FTP interno autenticado por LDAP/AD.
  # Política de acceso basada en rol: sólo miembros de grupos autorizados en AD.
  ftpd_autenticado:
    image: instrumentisto/pure-ftpd:latest
    container_name: ftpd-auth
    depends_on:
      samba_dc:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
      - SYS_CHROOT
    networks:
      zone3_apps:
        ipv4_address: 10.2.3.22
    dns:
      - 10.2.3.5
    environment:
      PUBLICHOST: "10.2.3.22"
      FTP_PASSIVE_PORTS: "30000:30010"
      LDAP_CONFIG_FILE: /etc/pure-ftpd/pureftpd-ldap.conf
      ANONYMOUS_USER_ENABLED: "false"
    volumes:
      - ftpdata_auth:/var/ftp
      - ./configs/pureftpd-ldap.conf:/etc/pure-ftpd/pureftpd-ldap.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  samba_data:
  samba_config:
  ftpdata_auth:
